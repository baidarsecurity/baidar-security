<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baidar Security Services - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="logo-container">
                <img src="path/to/your/baidar-logo.png" alt="Baidar Security Logo" class="logo">
            </div>
            <div class="title-container">
                <h1>Baidar Security Service</h1>
                <!-- Optional: <p>Private Limited</p> if you want a tagline -->
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="contact-section">
            <h2 class="section-title">Contact Us</h2>

            <form class="contact-form">
                <input type="text" placeholder="Your Name" class="form-input">
                <input type="email" placeholder="Your Email" class="form-input">
                <textarea placeholder="Your Message" rows="6" class="form-input"></textarea>
                <button type="submit" class="send-button">Send Message</button>
            </form>

            <div class="contact-info">
                <h3 class="info-title">Office Address:</h3>
                <p>Office # 21-A, Street 32, F-7/1,</p>
                <p>Islamabad.</p>
                <br> <!-- Line break for separation -->
                <p>Office # 2, 2nd Floor, MashaAllah</p>
                <p>Plaza, Kalma Chowk, Ghauri Town,</p>
                <p>Islamabad.</p>

                <h3 class="info-title">Contact Number:</h3>
                <p>+92 333 0222539</p>

                <h3 class="info-title">Email:</h3>
                <p>baidar.security@hotmail.com</p>
            </div>
        </section>
    </main>

    <!-- Other parts of your page -->
</body>
</html>
